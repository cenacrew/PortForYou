packages:
  - apps/*
  - packages/*
  - templates/*/back
  - templates/*/front

# Overrides (pnpm 11 ne lit plus le champ "pnpm" de package.json) :
# tar = correctif de sécurité.
overrides:
  'tar@<6.2.2': '>=7.5.20'
  # Correctif CVE-2026-12151 (DoS undici via WebSocket). Seul consommateur
  # d'undici en dessous de ce correctif : firebase-tools (devDependency,
  # emulateurs/CLI local, jamais en prod) — firebase-admin/@google-cloud/
  # storage/google-auth-library (les vraies libs runtime) n'en dépendent pas
  # du tout (vérifié via `pnpm why undici -r`), donc pas de risque runtime à
  # sauter le major.
  'undici@<6.27.0': '^8.7.0'

# Scripts de build autorisés (pnpm 11 les bloque par défaut) : binaires natifs
# et codegen légitimes, requis pour esbuild/vitest, sharp (images Next), etc.
allowBuilds:
  '@firebase/util': true
  '@parcel/watcher': true
  '@sentry/cli': true
  '@swc/core': true
  esbuild: true
  protobufjs: true
  re2: true
  sharp: true

# pnpm 11 active par défaut une politique « minimum release age » (refuse les
# paquets trop récents) qui rejette le lockfile. On la désactive pour retrouver
# le comportement pnpm 10 (fichier copié dans les images Docker → vaut aussi au
# déploiement, contrairement à un .npmrc non copié).
minimumReleaseAge: 0
