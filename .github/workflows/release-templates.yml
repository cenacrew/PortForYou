name: Release Templates

# Publie les images back + fronts statiques des templates et met à jour la
# version courante dans Firestore. Déclenché par un changement dans templates/**.
on:
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - '.github/workflows/release-templates.yml'
  workflow_dispatch:
    inputs:
      template:
        description: 'Template à publier (atelier, monolith, papier ou all)'
        default: 'all'

env:
  PROJECT_ID: portforyou-vsp
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev
  BUILDS_BUCKET: portforyou-template-builds

permissions:
  contents: read
  id-token: write

# Une release ne doit pas être interrompue en cours (push image + GCS + Firestore).
concurrency:
  group: release-templates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    # Ajouter « [skip deploy] » au message de commit pour pousser sans republier.
    if: ${{ !contains(github.event.head_commit.message, '[skip deploy]') }}
    strategy:
      fail-fast: false
      matrix:
        template: [atelier, monolith, papier]
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}
          token_format: access_token
      - uses: google-github-actions/setup-gcloud@v3
      - uses: docker/setup-buildx-action@v4
      - name: Connexion à Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Version
        id: version
        run: echo "v=v${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build & push image back (cache GHA)
        uses: docker/build-push-action@v7
        with:
          # Contexte = racine du repo : le back dépend de packages/template-back-core.
          context: .
          file: templates/${{ matrix.template }}/back/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pfy/${{ matrix.template }}-back:${{ steps.version.outputs.v }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pfy/${{ matrix.template }}-back:latest
          cache-from: type=gha,scope=${{ matrix.template }}-back
          cache-to: type=gha,mode=max,scope=${{ matrix.template }}-back

      - name: Scan de l'image back (Trivy)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pfy/${{ matrix.template }}-back:${{ steps.version.outputs.v }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Build front statique
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @portforyou/${{ matrix.template }}-front build

      - name: Upload front vers GCS
        run: |
          gcloud storage rsync --recursive --delete-unmatched-destination-objects \
            "templates/${{ matrix.template }}/front/dist" \
            "gs://$BUILDS_BUCKET/${{ matrix.template }}/${{ steps.version.outputs.v }}"

      - name: Mettre à jour la version courante (Firestore)
        run: |
          TOKEN=$(gcloud auth print-access-token)
          curl -sf -X PATCH \
            "https://firestore.googleapis.com/v1/projects/$PROJECT_ID/databases/(default)/documents/templates/${{ matrix.template }}?updateMask.fieldPaths=currentVersion" \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
            -d '{"fields":{"currentVersion":{"stringValue":"${{ steps.version.outputs.v }}"}}}'
