name: actionlint

# Lint des workflows GitHub Actions (syntaxe, expressions, shell inline via
# shellcheck) — évite les typos silencieuses dans le YAML/shell des workflows.
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: actionlint
        uses: raven-actions/actionlint@v2
        with:
          fail-on-error: true
          shellcheck: true
