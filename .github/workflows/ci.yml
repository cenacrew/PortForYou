name: CI

# Pipeline unique : validation (lint + tests + e2e) puis, sur main uniquement et
# si la validation passe, déploiement de la plateforme sur Cloud Run.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read

# Annule les runs superséidés sur une branche/PR, mais jamais un run sur main
# (pour ne pas interrompre un déploiement en cours).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PROJECT_ID: portforyou-vsp
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev

jobs:
  changes:
    # Job-de-filtre : détecte si templates/** ou packages/template-back-core/**
    # ont changé, pour ne lancer templates-back/templates-front que si besoin.
    # Pattern needs+if (plutôt qu'un skip interne) : un job dont le `if` est
    # faux passe en statut "skipped", traité comme réussi par les required
    # checks de branch protection — donc pas de blocage si ces jobs deviennent
    # requis plus tard.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      templates: ${{ steps.filter.outputs.templates }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            templates:
              - 'templates/**'
              - 'packages/template-back-core/**'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint (eslint + prettier)
        run: pnpm lint
      - name: Typecheck & build (tsc de tous les packages)
        run: pnpm build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      # L'émulateur Firestore (test:emu) tourne sur la JVM.
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - run: pnpm install --frozen-lockfile
      - name: Build du package partagé (importé par l'API)
        run: pnpm --filter @portforyou/shared build
      - name: Tests unitaires (plateforme)
        run: pnpm --filter @portforyou/api --filter @portforyou/web test
      - name: Tests d'intégration API (émulateur Firestore)
        run: pnpm --filter @portforyou/api test:emu

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - run: pnpm install --frozen-lockfile
      - name: Build du package partagé
        run: pnpm --filter @portforyou/shared build
      - name: Cache des navigateurs Playwright
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Installe Chromium
        run: pnpm --filter @portforyou/web exec playwright install --with-deps chromium
      - name: E2E Playwright (parcours démo complet)
        run: pnpm --filter @portforyou/web test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  templates-back:
    # Le back est commun aux 3 templates (packages/template-back-core) : un seul
    # job suffit, plus besoin d'une matrice qui rejouerait 3x les mêmes tests.
    needs: [changes]
    if: needs.changes.outputs.templates == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Tests du back commun des templates
        run: pnpm --filter @portforyou/template-back-core test

  templates-front:
    # Le front diffère par template (DA propre à chacun) : chacun testé dans
    # son propre job (résumé lisible et attribué, plutôt qu'un seul bloc).
    needs: [changes]
    if: needs.changes.outputs.templates == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: [atelier, monolith, papier]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Tests du front ${{ matrix.template }}
        run: pnpm --filter @portforyou/${{ matrix.template }}-front test

  deploy:
    # Déploiement de la plateforme : seulement sur main, si lint + tests passent,
    # et sauf si le commit contient « [skip deploy] » (déjà déployé à la main).
    needs: [lint, test]
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      !contains(github.event.head_commit.message, '[skip deploy]')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write # Workload Identity Federation — aucune clé de SA
    # Ne jamais interrompre un déploiement ; les déploiements se sérialisent.
    concurrency:
      group: deploy-platform
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v3

      - uses: docker/setup-buildx-action@v4

      - name: Connexion à Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build & push API (cache GHA)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pfy/api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Scan de l'image API (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pfy/api:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Deploy API (Cloud Run)
        run: |
          gcloud run deploy pfy-api \
            --image "$REGISTRY/$PROJECT_ID/pfy/api:${{ github.sha }}" \
            --region "$REGION" \
            --allow-unauthenticated \
            --min-instances 0 --max-instances 3 \
            --set-env-vars "NODE_ENV=production,PAYMENT_DRIVER=stripe,PROVISIONER_DRIVER=gcp,PROVISIONING_VIA_TASKS=1,REQUIRE_VERIFIED_EMAIL=1,GCP_PROJECT_ID=$PROJECT_ID,COMMIT_SHA=${{ github.sha }},STRIPE_PRICE_BASE=price_1TpnUJ3UvSqKvC9na5LO4KRc,STRIPE_PRICE_DOMAIN=price_1TpnUK3UvSqKvC9nohRxnASV,STRIPE_PRICE_INFRA=price_1TpnUK3UvSqKvC9nr3A3H1Sr,GOOGLE_OAUTH_CLIENT_ID=212335230613-2v8i6fp1g7evjmqbi2kd9p6a4pe5q9l9.apps.googleusercontent.com,CONTACT_INBOX=valetnina.sp@gmail.com" \
            --set-secrets "JWT_SECRET=pfy-jwt-secret:latest,STRIPE_SECRET_KEY=pfy-stripe-secret:latest,STRIPE_WEBHOOK_SECRET=pfy-stripe-webhook:latest,GOOGLE_OAUTH_CLIENT_SECRET=pfy-google-oauth-secret:latest,RESEND_API_KEY=pfy-resend-key:latest" \
            --service-account "pfy-api@$PROJECT_ID.iam.gserviceaccount.com"

      - name: URL de l'API (pour l'inline build-time du front)
        id: apiurl
        run: echo "url=$(gcloud run services describe pfy-api --region "$REGION" --format='value(status.url)')" >> "$GITHUB_OUTPUT"

      - name: Build & push Web (cache GHA)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          # NEXT_PUBLIC_API_URL est inliné au BUILD par Next.js → build-arg obligatoire.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.apiurl.outputs.url }}
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pfy/web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Scan de l'image Web (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pfy/web:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Deploy Web (Cloud Run)
        run: |
          gcloud run deploy pfy-web \
            --image "$REGISTRY/$PROJECT_ID/pfy/web:${{ github.sha }}" \
            --region "$REGION" \
            --allow-unauthenticated \
            --min-instances 0 --max-instances 3

      - name: Post-deploy — CORS/URLs de l'API
        run: |
          # La vitrine publique est servie par Firebase Hosting (URL propre) qui
          # proxifie vers Cloud Run pfy-web → c'est cette origine qu'attend le CORS.
          gcloud run services update pfy-api --region "$REGION" \
            --update-env-vars "WEB_ORIGIN=https://portforyou.web.app,API_PUBLIC_URL=${{ steps.apiurl.outputs.url }}"

      - name: Purge du cache Firebase Hosting
        run: |
          # Hosting proxifie vers pfy-web mais met la réponse en cache CDN
          # (s-maxage long). Une nouvelle release Hosting invalide ce cache pour
          # que la nouvelle révision de la vitrine soit servie immédiatement.
          # Auth via l'ADC posée par google-github-actions/auth (WIF).
          npx -y firebase-tools@15 deploy --only hosting:portforyou \
            --project "$PROJECT_ID" --non-interactive

      - name: Smoke test — santé de l'API déployée
        run: |
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 5 --retry-all-errors \
            "${{ steps.apiurl.outputs.url }}/api/v1/health"

      - name: Smoke test — home de la vitrine
        run: |
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 5 --retry-all-errors \
            "https://portforyou.web.app/"
