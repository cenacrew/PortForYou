name: CI

# Pipeline unique : validation (lint + tests + e2e) puis, sur main uniquement et
# si la validation passe, déploiement de la plateforme sur Cloud Run.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - 'LICENSE'
  workflow_dispatch:

# Piège connu : une PR qui ne touche QUE des chemins listés ci-dessus
# (paths-ignore) ne déclenche jamais ce workflow via l'événement
# `pull_request` — donc les checks requis par la protection de branche
# (lint/test/e2e) ne sont jamais produits pour cette PR, et GitHub la
# bloque indéfiniment ("N of N required status checks are expected"),
# même si tout le reste est prêt. Un déclenchement manuel
# (`workflow_dispatch`) ne corrige PAS ça : GitHub ne relie pas ce run à
# l'évaluation des checks requis de la PR (contrairement à un run
# déclenché par l'événement `pull_request` lui-même). Solution ponctuelle :
# faire un commit qui touche aussi un fichier hors paths-ignore (même
# trivial, ex. ce commentaire) pour forcer un vrai run `pull_request`.

permissions:
  contents: read

# Annule les runs superséidés sur une branche/PR, mais jamais un run sur main
# (pour ne pas interrompre un déploiement en cours).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PROJECT_ID: portforyou-vsp
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev

jobs:
  changes:
    # Job-de-filtre : détecte si templates/** ou packages/template-back-core/**
    # ont changé, pour ne lancer templates-back/templates-front que si besoin.
    # Pattern needs+if (plutôt qu'un skip interne) : un job dont le `if` est
    # faux passe en statut "skipped", traité comme réussi par les required
    # checks de branch protection — donc pas de blocage si ces jobs deviennent
    # requis plus tard.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      templates: ${{ steps.filter.outputs.templates }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            templates:
              - 'templates/**'
              - 'packages/template-back-core/**'
              - 'packages/template-front-core/**'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint (eslint + prettier)
        run: pnpm lint
      - name: Typecheck & build (tsc de tous les packages)
        run: pnpm build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      # L'émulateur Firestore (test:emu) tourne sur la JVM.
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21
      - run: pnpm install --frozen-lockfile
      - name: Build du package partagé (importé par l'API)
        run: pnpm --filter @portforyou/shared build
      - name: Tests unitaires (plateforme)
        run: pnpm --filter @portforyou/api --filter @portforyou/web test
      - name: Tests d'intégration API (émulateur Firestore)
        run: pnpm --filter @portforyou/api test:emu

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21
      - run: pnpm install --frozen-lockfile
      - name: Build du package partagé
        run: pnpm --filter @portforyou/shared build
      - name: Cache des navigateurs Playwright
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Installe Chromium
        run: pnpm --filter @portforyou/web exec playwright install --with-deps chromium
      - name: E2E Playwright (parcours démo complet)
        run: pnpm --filter @portforyou/web test:e2e
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  templates-back:
    # Back ET front partagés des templates : le back (packages/template-back-core)
    # et la logique front commune (packages/template-front-core) sont mutualisés,
    # un seul job les teste — plus besoin d'une matrice qui rejouerait 3x.
    needs: [changes]
    if: needs.changes.outputs.templates == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Tests du back commun des templates
        run: pnpm --filter @portforyou/template-back-core test
      - name: Tests du front commun des templates
        run: pnpm --filter @portforyou/template-front-core test

  templates-front:
    # Chaque front ne porte plus que sa direction artistique (Artwork,
    # ArtworkList, index.css, index.jsx) ; on valide que chacun se build bien
    # avec le core front partagé (le rendu DA est couvert par la régression
    # visuelle Playwright). Matrice pour un résumé lisible et attribué.
    needs: [changes]
    if: needs.changes.outputs.templates == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: [atelier, monolith, papier]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build du front ${{ matrix.template }}
        run: pnpm --filter @portforyou/${{ matrix.template }}-front build
      - name: Tests du front ${{ matrix.template }}
        run: pnpm --filter @portforyou/${{ matrix.template }}-front test

  deploy:
    # Déploiement de la plateforme : seulement sur main, si lint + tests passent,
    # et sauf si le commit contient « [skip deploy] » (déjà déployé à la main).
    needs: [lint, test]
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      !contains(github.event.head_commit.message, '[skip deploy]')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write # Workload Identity Federation — aucune clé de SA
    # Ne jamais interrompre un déploiement ; les déploiements se sérialisent.
    concurrency:
      group: deploy-platform
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: URL actuelle de l'API (avant tout déploiement)
        # Récupérée AVANT le build/deploy plutôt qu'après : l'URL Cloud Run
        # d'un service déjà existant ne change jamais d'un redéploiement à
        # l'autre, donc pas besoin d'attendre la fin du déploiement pour la
        # connaître. Sert à la fois au build-arg du front (NEXT_PUBLIC_API_URL)
        # et aux env vars du déploiement de l'API elle-même (WEB_ORIGIN,
        # API_PUBLIC_URL) — évite un second `gcloud run services update`
        # après coup, qui recréait inutilement une révision supplémentaire de
        # pfy-api à chaque déploiement (2× le nombre de révisions pour rien).
        # Vide au tout premier déploiement (service pas encore créé) : dans ce
        # cas précis seulement, une mise à jour manuelle post-bootstrap reste
        # nécessaire — non-problème une fois pfy-api créé une première fois.
        id: apiurl
        run: |
          echo "url=$(gcloud run services describe pfy-api --region "$REGION" --format='value(status.url)' 2>/dev/null || true)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Connexion à Artifact Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build & push API (cache GHA)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pfy/api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Scan de l'image API (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pfy/api:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          skip-dirs: /usr/local/lib/node_modules/npm
          exit-code: '1'

      - name: Deploy API (Cloud Run)
        run: |
          gcloud run deploy pfy-api \
            --image "$REGISTRY/$PROJECT_ID/pfy/api:${{ github.sha }}" \
            --region "$REGION" \
            --allow-unauthenticated \
            --min-instances 0 --max-instances 3 \
            --set-env-vars "NODE_ENV=production,PAYMENT_DRIVER=stripe,PROVISIONER_DRIVER=gcp,PROVISIONING_VIA_TASKS=1,REQUIRE_VERIFIED_EMAIL=1,GCP_PROJECT_ID=$PROJECT_ID,COMMIT_SHA=${{ github.sha }},WEB_ORIGIN=https://portforyou.web.app,API_PUBLIC_URL=${{ steps.apiurl.outputs.url }},STRIPE_PRICE_BASE=price_1TpnUJ3UvSqKvC9na5LO4KRc,STRIPE_PRICE_DOMAIN=price_1TpnUK3UvSqKvC9nohRxnASV,STRIPE_PRICE_INFRA=price_1TpnUK3UvSqKvC9nr3A3H1Sr,GOOGLE_OAUTH_CLIENT_ID=212335230613-2v8i6fp1g7evjmqbi2kd9p6a4pe5q9l9.apps.googleusercontent.com,CONTACT_INBOX=valetnina.sp@gmail.com" \
            --set-secrets "JWT_SECRET=pfy-jwt-secret:latest,STRIPE_SECRET_KEY=pfy-stripe-secret:latest,STRIPE_WEBHOOK_SECRET=pfy-stripe-webhook:latest,GOOGLE_OAUTH_CLIENT_SECRET=pfy-google-oauth-secret:latest,RESEND_API_KEY=pfy-resend-key:latest,SENTRY_DSN=pfy-sentry-dsn:latest" \
            --service-account "pfy-api@$PROJECT_ID.iam.gserviceaccount.com"

      - name: Build & push Web (cache GHA)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          # NEXT_PUBLIC_API_URL est inliné au BUILD par Next.js → build-arg obligatoire.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.apiurl.outputs.url }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pfy/web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Scan de l'image Web (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/pfy/web:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          skip-dirs: /usr/local/lib/node_modules/npm
          exit-code: '1'

      - name: Deploy Web (Cloud Run)
        run: |
          gcloud run deploy pfy-web \
            --image "$REGISTRY/$PROJECT_ID/pfy/web:${{ github.sha }}" \
            --region "$REGION" \
            --allow-unauthenticated \
            --min-instances 0 --max-instances 3 \
            --set-env-vars "NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}"

      - name: Purge du cache Firebase Hosting
        run: |
          # Hosting proxifie vers pfy-web mais met la réponse en cache CDN
          # (s-maxage long). Une nouvelle release Hosting invalide ce cache pour
          # que la nouvelle révision de la vitrine soit servie immédiatement.
          # Auth via l'ADC posée par google-github-actions/auth (WIF).
          npx -y firebase-tools@15 deploy --only hosting:portforyou \
            --project "$PROJECT_ID" --non-interactive

      - name: Smoke test — santé de l'API déployée
        run: |
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 5 --retry-all-errors \
            "${{ steps.apiurl.outputs.url }}/api/v1/health"

      - name: Smoke test — home de la vitrine
        run: |
          curl --fail --silent --show-error \
            --retry 5 --retry-delay 5 --retry-all-errors \
            "https://portforyou.web.app/"
