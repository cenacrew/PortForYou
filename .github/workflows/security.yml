name: Security

# Audit des dépendances sorti du CI bloquant : un nouvel avis de sécurité ne doit
# pas casser les PR au hasard. Tourne chaque lundi + à la demande.
on:
  schedule:
    - cron: '0 6 * * 1' # lundi 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit des dépendances (high+)
        run: pnpm audit --audit-level high
