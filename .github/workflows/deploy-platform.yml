name: Deploy Platform

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - '.github/workflows/deploy-platform.yml'
  workflow_dispatch:

env:
  PROJECT_ID: portforyou-vsp
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev

permissions:
  contents: read
  id-token: write # Workload Identity Federation — aucune clé de SA

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Docker auth Artifact Registry
        run: gcloud auth configure-docker $REGISTRY --quiet

      - name: Build & push API
        run: |
          IMAGE=$REGISTRY/$PROJECT_ID/pfy/api:${{ github.sha }}
          docker build -f apps/api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "API_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy API (Cloud Run)
        run: |
          gcloud run deploy pfy-api \
            --image "$API_IMAGE" \
            --region $REGION \
            --allow-unauthenticated \
            --min-instances 0 --max-instances 3 \
            --set-env-vars "NODE_ENV=production,PAYMENT_DRIVER=fake,PROVISIONER_DRIVER=gcp,PROVISIONING_VIA_TASKS=1,REQUIRE_VERIFIED_EMAIL=0,GCP_PROJECT_ID=$PROJECT_ID,STRIPE_PRICE_BASE=price_1TpnUJ3UvSqKvC9na5LO4KRc,STRIPE_PRICE_DOMAIN=price_1TpnUK3UvSqKvC9nohRxnASV,STRIPE_PRICE_INFRA=price_1TpnUK3UvSqKvC9nr3A3H1Sr"             --set-secrets "JWT_SECRET=pfy-jwt-secret:latest,STRIPE_SECRET_KEY=pfy-stripe-secret:latest" \
            --service-account pfy-api@$PROJECT_ID.iam.gserviceaccount.com

      - name: Build & push Web
        run: |
          IMAGE=$REGISTRY/$PROJECT_ID/pfy/web:${{ github.sha }}
          docker build -f apps/web/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "WEB_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy Web (Cloud Run)
        run: |
          API_URL=$(gcloud run services describe pfy-api --region $REGION --format='value(status.url)')
          gcloud run deploy pfy-web \
            --image "$WEB_IMAGE" \
            --region $REGION \
            --allow-unauthenticated \
            --min-instances 0 --max-instances 3 \
            --set-env-vars "NEXT_PUBLIC_API_URL=$API_URL"

      - name: Post-deploy config API
        run: |
          WEB_URL=$(gcloud run services describe pfy-web --region $REGION --format='value(status.url)')
          API_URL=$(gcloud run services describe pfy-api --region $REGION --format='value(status.url)')
          gcloud run services update pfy-api --region $REGION \
            --update-env-vars "WEB_ORIGIN=$WEB_URL,API_PUBLIC_URL=$API_URL"
