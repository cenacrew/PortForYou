sonar.projectKey=cenacrew_PortForYou
sonar.organization=cenacrew

sonar.sources=apps,packages,templates
sonar.exclusions=**/dist/**,**/coverage/**,**/node_modules/**,**/*.test.*,**/__tests__/**,**/playwright-report/**,**/test-results/**

sonar.tests=apps,packages,templates
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.test.jsx,**/__tests__/**

# Rapports de couverture Vitest (lcov), générés par `test:coverage` (ou
# `test:coverage:emu` pour apps/api, qui a besoin de l'émulateur Firestore
# pour ses tests d'intégration).
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info,packages/template-back-core/coverage/lcov.info,packages/template-front-core/coverage/lcov.info
